# ============================================================================
# CI: prove the monitoring stack actually boots and produces metrics.
#
# This workflow exists so the repo's claims are publicly verifiable — anyone
# can open the Actions tab and see the stack come up, the SLO rules validate,
# and real metrics flow end to end. It asserts only what it can genuinely
# check; it does not claim to load-test alerts or judge dashboards.
# ============================================================================

name: monitoring-stack-ci

on:
  push:
    paths: ['monitoring/**', '.github/workflows/monitoring-ci.yml']
  pull_request:
    paths: ['monitoring/**', '.github/workflows/monitoring-ci.yml']
  workflow_dispatch:

jobs:
  validate-and-boot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitoring

    steps:
      - uses: actions/checkout@v4

      # --- 1. Static validation of Prometheus rules + config ----------------
      - name: Install promtool
        run: |
          PROM_VER=2.54.1
          curl -sSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VER}/prometheus-${PROM_VER}.linux-amd64.tar.gz" \
            | tar xz
          sudo mv "prometheus-${PROM_VER}.linux-amd64/promtool" /usr/local/bin/

      - name: Validate Prometheus config and rules
        run: |
          promtool check config prometheus/prometheus.yml
          promtool check rules prometheus/rules.yml

      # --- 2. Boot the full stack -------------------------------------------
      - name: Start stack
        run: docker compose up -d

      - name: Wait for Prometheus to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/-/ready >/dev/null; then echo "Prometheus ready"; break; fi
            sleep 2
          done

      # --- 3. Assert the wiring actually works ------------------------------
      # A single Python helper that POLLS each query until data appears, rather
      # than assuming one fixed sleep is enough. It parses defensively, so an
      # empty/not-yet-scraped response retries instead of crashing. This is the
      # realistic shape of a readiness check against a freshly-booted stack.
      - name: Assert metrics, targets and rules (with polling)
        run: |
          python3 - <<'PY'
          import json, time, urllib.request, urllib.parse, sys

          BASE = "http://localhost:9090/api/v1/query"

          def query(expr, attempts=40, delay=3):
              """Poll Prometheus until the query returns at least one result."""
              last = None
              for i in range(attempts):
                  try:
                      url = f"{BASE}?query={urllib.parse.quote(expr)}"
                      with urllib.request.urlopen(url, timeout=5) as r:
                          data = json.load(r)
                      results = data.get("data", {}).get("result", [])
                      if results:
                          return results
                      last = "empty result"
                  except Exception as e:
                      last = repr(e)
                  time.sleep(delay)
              raise SystemExit(f"FAILED: '{expr}' produced no data after "
                               f"{attempts*delay}s (last: {last})")

          # 1) sql_exporter target is UP
          res = query('up{job="sql_exporter"}')
          val = res[0]["value"][1]
          print(f"sql_exporter up = {val}")
          assert val == "1", "sql_exporter target is not UP"

          # 2) operational metrics are flowing
          for metric in ("pos_transactions_total",
                         "store_sync_lag_seconds",
                         "sync_queue_backlog"):
              res = query(metric)
              print(f"{metric} series = {len(res)}")
              assert len(res) > 0

          # 3) SLO recording rule has evaluated
          res = query("pos:txn_total:rate5m")
          print(f"recording rule pos:txn_total:rate5m series = {len(res)}")
          assert len(res) > 0

          print("All monitoring assertions passed.")
          PY

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
