# ============================================================================
# CI: scan Terraform for security misconfigurations with Checkov.
#
# Demonstrates a policy gate: the intentionally-insecure example must be
# caught (the scan is EXPECTED to find issues there), proving the gate works.
# In a real repo you'd fail the build on findings in production modules.
# ============================================================================

name: security-scan-ci

on:
  push:
    paths: ['security/**', '.github/workflows/security-ci.yml']
  pull_request:
    paths: ['security/**', '.github/workflows/security-ci.yml']
  workflow_dispatch:

jobs:
  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov

      # The insecure file is a fixture: we ASSERT Checkov flags it, proving
      # the gate detects real problems. soft-fail so CI stays green while
      # still surfacing the findings in the log.
      - name: Scan (expect findings on the insecure fixture)
        run: |
          checkov -d security/terraform --soft-fail --compact
          echo "Checkov ran. Review findings above; main_insecure.tf is the fixture."

      # Prove the hardened file passes for the threats this demo is about:
      # encryption, public-access block, versioning, and a scoped security group.
      #
      # We skip a handful of checks that are best-practice nags rather than
      # vulnerabilities, and which a minimal standalone example can't satisfy:
      #   CKV2_AWS_61  - bucket lifecycle config (org policy choice)
      #   CKV2_AWS_62  - bucket event notifications (org policy choice)
      #   CKV_AWS_18   - access logging (needs a separate log-target bucket)
      #   CKV_AWS_144  - cross-region replication (needs a second region/bucket)
      #   CKV2_AWS_5   - SG "attached to a resource" (no EC2/ENI in this fixture)
      # The security-relevant checks (encryption, public-access, SG ingress)
      # are still enforced and must pass.
      - name: Scan hardened file (expect clean for demonstrated threats)
        run: |
          mkdir -p /tmp/secure && cp security/terraform/main_secure.tf /tmp/secure/
          checkov -d /tmp/secure --compact \
            --skip-check CKV2_AWS_61,CKV2_AWS_62,CKV_AWS_18,CKV_AWS_144,CKV2_AWS_5
