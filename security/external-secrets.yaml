# ============================================================================
# External Secrets Operator (ESO) — pull secrets from AWS Secrets Manager
# into Kubernetes instead of committing them or hand-managing K8s Secrets.
#
# Extends the AWS Secrets Manager work I did in prior CI/CD pipelines: the
# vault stays the source of truth, ESO syncs into the cluster, and the app
# consumes a normal Secret. Nothing sensitive lives in git.
# ============================================================================

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: prod
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-central-1
      auth:
        # IRSA — pod assumes an IAM role; no static keys in-cluster.
        jwt:
          serviceAccountRef:
            name: pos-sync-worker
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: pos-db-credentials
  namespace: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: pos-db-credentials        # the K8s Secret ESO will create/sync
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: cloud4retail/pos/db
        property: username
    - secretKey: password
      remoteRef:
        key: cloud4retail/pos/db
        property: password
